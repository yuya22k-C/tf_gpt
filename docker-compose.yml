version: '3.9'
services:
  backend:
    image: node:22-alpine
    working_dir: /app/backend
    volumes:
      - ./:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - '3001:3001'
    environment:
      - PORT=3001
      - FRONTEND_ORIGIN=http://localhost:5173

  frontend:
    image: node:22-alpine
    working_dir: /app/frontend
    volumes:
      - ./:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - '5173:5173'
    depends_on:
      - backend
